<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蔚来 AI 助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    /* Markdown rendering inside assistant messages */
    .prose p  { margin-bottom: 0.5em; }
    .prose p:last-child { margin-bottom: 0; }
    .prose ul, .prose ol { margin: 0.4em 0; padding-left: 1.4em; }
    .prose li { margin-bottom: 0.2em; }
    .prose code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px;
                  font-size: 0.83em; font-family: ui-monospace, monospace; }
    .prose pre  { background: #f3f4f6; padding: 10px 12px; border-radius: 6px;
                  overflow-x: auto; margin: 0.5em 0; }
    .prose pre code { background: none; padding: 0; font-size: 0.85em; }
    .prose table { border-collapse: collapse; margin: 0.6em 0; font-size: 0.85em; width: 100%; }
    .prose th, .prose td { border: 1px solid #e5e7eb; padding: 5px 10px; text-align: left; }
    .prose th { background: #f9fafb; font-weight: 600; }
    .prose h1,.prose h2,.prose h3 { font-weight: 600; margin: 0.6em 0 0.3em; }
    .prose strong { font-weight: 600; }
    .prose a { color: #2563eb; text-decoration: underline; }

    /* Tool pills */
    .pill { display: inline-flex; align-items: center; gap: 3px;
            padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 500;
            border: 1px solid; margin: 1px 2px; }
    .pill-rag { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
    .pill-web { border-color: #bbf7d0; background: #f0fdf4; color: #15803d; }

    /* Blinking cursor while streaming */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display: inline-block; width: 2px; height: 1em;
              background: #9ca3af; border-radius: 1px; animation: blink 1s step-end infinite;
              vertical-align: text-bottom; margin-left: 1px; }
  </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden text-gray-800">

<div class="flex flex-col h-screen">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center gap-3 flex-shrink-0">
    <span class="font-semibold text-sm text-gray-900">○ 蔚来 AI 助手</span>
    <span class="text-xs text-gray-400 hidden sm:block">RAG + Agent</span>
    <div class="flex-1"></div>
    <input id="sessionInput" type="text" placeholder="Session ID（可选）"
      class="text-xs border border-gray-200 rounded px-2 py-1.5 w-32 focus:outline-none focus:border-gray-400 text-gray-600" />
    <input id="profileInput" type="text" placeholder="用户偏好（可选）"
      class="text-xs border border-gray-200 rounded px-2 py-1.5 w-40 focus:outline-none focus:border-gray-400 text-gray-600 hidden sm:block" />
    <button id="clearBtn"
      class="text-xs text-gray-500 hover:text-gray-900 border border-gray-200 hover:border-gray-300 rounded px-3 py-1.5 transition-colors">
      清空
    </button>
    <button id="devToggle"
      class="text-xs text-gray-500 hover:text-gray-900 border border-gray-200 hover:border-gray-300 rounded px-3 py-1.5 transition-colors">
      开发者 ↗
    </button>
  </header>

  <!-- ── Body ───────────────────────────────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Chat column -->
    <div class="flex flex-col flex-1 min-w-0">

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-5">
        <div id="emptyState" class="flex flex-col items-center justify-center h-full text-center py-20">
          <div class="text-3xl mb-3 opacity-40">○</div>
          <p class="text-gray-400 text-sm">向我询问关于蔚来汽车的任何问题</p>
          <p class="text-gray-300 text-xs mt-1">续航 · 配置 · 对比 · 购车建议</p>
        </div>
      </div>

      <!-- Input -->
      <div class="flex-shrink-0 bg-white border-t border-gray-200 px-4 py-3">
        <div class="flex gap-2 items-end">
          <textarea id="chatInput" rows="1" placeholder="问我关于蔚来汽车的任何问题…"
            class="flex-1 resize-none border border-gray-200 rounded-lg px-3 py-2.5 text-sm
                   focus:outline-none focus:border-gray-400 transition-colors bg-white leading-snug"
            style="min-height:42px; max-height:120px;"></textarea>
          <button id="sendBtn"
            class="flex-shrink-0 bg-gray-900 text-white text-sm rounded-lg px-4 py-2.5
                   hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
            style="height:42px;">
            发送
          </button>
        </div>
        <p class="text-xs text-gray-400 mt-1.5">Enter 发送 · Shift+Enter 换行</p>
      </div>
    </div>

    <!-- Dev panel (hidden by default) -->
    <div id="devPanel"
      class="hidden w-96 flex-shrink-0 border-l border-gray-200 bg-white flex flex-col overflow-hidden">

      <div class="px-3 py-2.5 border-b border-gray-100 flex items-center gap-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide flex-1">开发者面板</span>
        <button class="dev-tab text-xs px-2.5 py-1 rounded font-medium bg-gray-100 text-gray-700" data-tab="trace">执行轨迹</button>
        <button class="dev-tab text-xs px-2.5 py-1 rounded font-medium text-gray-400 hover:text-gray-600" data-tab="system">系统</button>
      </div>

      <!-- Trace tab -->
      <div id="tab-trace" class="flex-1 overflow-y-auto p-3 space-y-2">
        <p class="text-xs text-gray-400 text-center mt-6">发送消息后查看执行轨迹</p>
      </div>

      <!-- System tab -->
      <div id="tab-system" class="hidden flex-1 overflow-y-auto p-3">
        <div id="systemInfo" class="text-xs text-gray-400">加载中…</div>
      </div>
    </div>

  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
